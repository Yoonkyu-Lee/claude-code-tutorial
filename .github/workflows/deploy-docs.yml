name: Deploy docs to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# gh-pages 브랜치 방식: 빌드한 site/를 gh-pages 브랜치에 직접 push한다.
# actions/deploy-pages 백엔드가 이 리포에서 간헐적으로 "deployment_queued"로
# 스턱되어(2026-07 재발), 그 백엔드를 우회하는 브랜치 배포로 전환.
permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - run: pip install -r requirements-docs.txt
      - run: bash scripts/gen-pages.sh   # 채널 폴더 .pages(최신순) 생성 (새 채널도 자동)
      - run: mkdocs build
        env:
          DISABLE_MKDOCS_2_WARNING: 'true'
      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          force_orphan: true
